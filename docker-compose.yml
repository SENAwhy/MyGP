version: "3.9"

# ============================================================
# AIOps 监控大屏 — 完整 Docker 拓扑
#
# 启动前请先配置 .env 文件（参考 .env.example）：
#   cp .env.example .env
#   # 编辑 .env 填入实际的密钥和密码
#
# 启动命令：
#   docker compose up -d
#
# 服务拓扑：
#   mysql          — MySQL 8.0 数据库
#   api            — FastAPI 后端 + 前端静态页面
#   agent-db       — 模拟数据库服务器节点
#   agent-web      — 模拟 Web 服务器节点
#   agent-storage  — 模拟存储服务器节点
# ============================================================

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: aiops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin123}
      MYSQL_DATABASE: aiops_monitor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - aiops-net

  # ---- FastAPI 后端 + 前端 ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aiops-api
    environment:
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-admin123}@mysql:3306/aiops_monitor
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SENDER_EMAIL=${SENDER_EMAIL:-}
      - SENDER_PASS=${SENDER_PASS:-}
      - RECEIVER_EMAIL=${RECEIVER_EMAIL:-}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-600}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiops-net

  # ---- 模拟节点：数据库服务器 ----
  agent-db:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: aiops-agent-db
    hostname: Node-DB-Shanghai
    environment:
      - NODE_ROLE=db
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-admin123}@mysql:3306/aiops_monitor
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    networks:
      - aiops-net

  # ---- 模拟节点：Web 服务器 ----
  agent-web:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: aiops-agent-web
    hostname: Node-Web-Tokyo
    environment:
      - NODE_ROLE=web
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-admin123}@mysql:3306/aiops_monitor
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    networks:
      - aiops-net

  # ---- 模拟节点：存储服务器 ----
  agent-storage:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: aiops-agent-storage
    hostname: Node-Storage-Frankfurt
    environment:
      - NODE_ROLE=storage
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-admin123}@mysql:3306/aiops_monitor
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    networks:
      - aiops-net

volumes:
  mysql_data:

networks:
  aiops-net:
    driver: bridge
