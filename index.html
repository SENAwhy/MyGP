<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps 监控大屏 Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 30px; margin: 0;}
        .card { background: #1e1e1e; border: 1px solid #333; padding: 30px; border-radius: 12px; width: 600px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;}
        .number-board { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .data-text { font-size: 32px; font-weight: bold; color: #00ffcc; text-align: center; margin-top: 10px;}
        .mem-text { color: #ff4757; }
        
        /* 图表和排行榜容器 */
        #chart-container { width: 100%; height: 250px; margin-bottom: 20px; }
        .process-list { background: #2f3542; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;}
        .process-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #555; padding: 8px 0; }
        
        button { border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; width: 100%; background: #ff4757; color: white; }
        button:hover { background: #ff6b81; box-shadow: 0 0 15px #ff4757; }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
        .report-box { margin-top: 20px; padding: 15px; background: #2f3542; border-radius: 8px; border-left: 4px solid #ff4757; line-height: 1.6;}
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <div class="header">
                <h2>🚀 AIOps 智能监控平台 (Pro版)</h2>
            </div>
            
            <div class="number-board">
                <div>CPU 使用率<div class="data-text">{{ cpu }} %</div></div>
                <div>内存 使用率<div class="data-text mem-text">{{ memory }} %</div></div>
            </div>

            <div id="chart-container"></div>

            <div class="process-list">
                <strong style="color: #ced6e0;">🔥 实时高耗能进程 Top 3：</strong>
                <div class="process-item" v-for="(p, index) in topProcs" :key="index">
                    <span>🥇 NO.{{ index + 1 }} | {{ p.name }} (PID: {{ p.pid }})</span>
                    <span style="color: #ff4757; font-weight: bold;">{{ p.cpu_percent }}%</span>
                </div>
            </div>
            
            <button @click="getAIReport" :disabled="isDiagnosing">
                {{ isDiagnosing ? ' DeepSeek 分析中...' : '🚨 异常发生？一键生成 AI 根因报告' }}
            </button>
            <div v-if="reportData" class="report-box">
                <strong style="color: #ff4757;"> AI 智能诊断：</strong><br><br>
                {{ reportData }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const cpu = ref(0); const memory = ref(0);
                const topProcs = ref([]); 
                const isDiagnosing = ref(false); const reportData = ref("");

                // 给折线图准备的数据数组
                let myChart = null;
                const timeData = []; const cpuData = []; const memData = [];

                // 🌟 初始化 ECharts 图表
                const initChart = () => {
                    myChart = echarts.init(document.getElementById('chart-container'));
                    myChart.setOption({
                        tooltip: { trigger: 'axis' },
                        legend: { data: ['CPU', '内存'], textStyle: { color: '#fff' } },
                        xAxis: { type: 'category', data: timeData, axisLabel: { color: '#fff' } },
                        yAxis: { type: 'value', max: 100, axisLabel: { color: '#fff' }, splitLine: { lineStyle: { color: '#333' } } },
                        series: [
                            { name: 'CPU', type: 'line', data: cpuData, smooth: true, itemStyle: {color: '#00ffcc'}, areaStyle: {opacity: 0.1} },
                            { name: '内存', type: 'line', data: memData, smooth: true, itemStyle: {color: '#ff4757'}, areaStyle: {opacity: 0.1} }
                        ]
                    });
                };

                const getData = async () => {
                    try {
                        const response = await fetch('http://127.0.0.1:8000/api/system_status');
                        const result = await response.json();
                        if (result.status === 'success') {
                            cpu.value = result.cpu_usage;
                            memory.value = result.memory_usage;
                            topProcs.value = result.top_processes; // 更新排行榜

                            // 🌟 更新图表数据：保持屏幕上最多显示 10 个点
                            if(timeData.length > 10) { timeData.shift(); cpuData.shift(); memData.shift(); }
                            timeData.push(result.time);
                            cpuData.push(result.cpu_usage);
                            memData.push(result.memory_usage);

                            // 让图表重新渲染
                            myChart.setOption({ xAxis: { data: timeData }, series: [ { data: cpuData }, { data: memData } ] });
                        }
                    } catch (error) { console.error("数据连接断开"); }
                }

                const getAIReport = async () => {
                    isDiagnosing.value = true; reportData.value = "";
                    try {
                        const response = await fetch('http://127.0.0.1:8000/api/diagnose');
                        const result = await response.json();
                        reportData.value = result.report;
                    } catch (error) { reportData.value = "请求 AI 接口失败。"; } 
                    finally { isDiagnosing.value = false; }
                }

                // Vue 页面加载完毕后，启动图表和定时器
                onMounted(() => {
                    initChart();
                    setInterval(getData, 2000);
                });

                return { cpu, memory, topProcs, isDiagnosing, reportData, getAIReport }
            }
        }).mount('#app')
    </script>
</body>
</html>
